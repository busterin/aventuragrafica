<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aventura Grafica - Prueba</title>
    <style>
      :root {
        --inventory-width: clamp(320px, 36vw, 560px);
        --character-size: clamp(95px, 11vw, 145px);
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", Verdana, sans-serif;
      }

      #scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(180deg, #8fb7db 0%, #d8ecff 42%, #7a9569 100%);
      }

      #background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .entity {
        position: absolute;
        z-index: 2;
        cursor: pointer;
      }

      #risko {
        width: var(--character-size);
        left: 4vw;
        bottom: 4vh;
        transition: left 1.8s linear, top 1.8s linear, bottom 1.8s linear;
        pointer-events: none;
        z-index: 3;
      }

      #gaston {
        width: var(--character-size);
        left: 50%;
        top: 66%;
        transform: translate(-50%, -50%);
      }

      #bate-world {
        width: clamp(80px, 10vw, 130px);
        right: 6vw;
        top: 70%;
        transform: translateY(-50%);
      }

      #speech {
        position: absolute;
        z-index: 4;
        display: none;
        padding: 12px 16px;
        max-width: 190px;
        background: #fff;
        color: #111;
        border: 3px solid #111;
        border-radius: 20px;
        font-weight: 700;
      }

      #speech::after {
        content: "";
        position: absolute;
        left: 20px;
        bottom: -16px;
        width: 24px;
        height: 24px;
        background: #fff;
        border-right: 3px solid #111;
        border-bottom: 3px solid #111;
        transform: rotate(45deg);
      }

      #inventory {
        position: absolute;
        width: var(--inventory-width);
        aspect-ratio: 1078 / 221;
        right: 18px;
        bottom: 18px;
        z-index: 5;
      }

      #inventory-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .inventory-slot {
        position: absolute;
        top: 18%;
        width: 12.5%;
        height: 64%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #slot-1 { left: 6.8%; }
      #slot-2 { left: 20.9%; }
      #slot-3 { left: 35.1%; }

      #bate-item {
        width: 90%;
        max-height: 90%;
        object-fit: contain;
        cursor: grab;
        display: none;
      }

      #bate-item:active {
        cursor: grabbing;
      }

      .fallback {
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.8);
        border: 2px dashed #333;
        color: #111;
        font-size: 14px;
        font-weight: 700;
      }

      .buzz {
        animation: buzz 0.2s linear 0s 2;
      }

      @keyframes buzz {
        0% { transform: translateX(0); }
        25% { transform: translateX(-4px) rotate(-3deg); }
        75% { transform: translateX(4px) rotate(3deg); }
        100% { transform: translateX(0); }
      }
    </style>
  </head>
  <body>
    <div id="scene" aria-label="Escena">
      <img id="background" src="images/fondo1.png" alt="Fondo" />

      <img id="risko" class="entity" src="images/risko.png" alt="Risko" />
      <img id="gaston" class="entity" src="images/gaston.png" alt="Gaston" />
      <img id="bate-world" class="entity" src="images/bate.png" alt="Bate" />

      <div id="speech">PRUEBA</div>

      <div id="inventory" aria-label="Inventario">
        <img id="inventory-bg" src="images/inventario.png" alt="Inventario" />
        <div id="slot-1" class="inventory-slot"></div>
        <div id="slot-2" class="inventory-slot"></div>
        <div id="slot-3" class="inventory-slot"></div>
        <img id="bate-item" class="inventory-item" src="images/bate.png" alt="Bate en inventario" draggable="true" />
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
