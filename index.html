<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aventura Grafica - Prueba</title>
    <style>
      :root {
        --inventory-width: clamp(300px, 33vw, 520px);
        --character-height: 300px;
        --guardian-left: 820px;
        --gaston-left: 1100px;
        --anillo-left: 960px;
        --anillo-top: 860px;
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: "Trebuchet MS", Verdana, sans-serif;
      }

      #scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: linear-gradient(180deg, #8fb7db 0%, #d8ecff 42%, #7a9569 100%);
      }

      #background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .entity {
        position: absolute;
        z-index: 2;
        cursor: pointer;
      }

      #guardian {
        height: var(--character-height);
        width: auto;
        left: var(--guardian-left);
        bottom: 0;
        transition: left 1.4s linear, transform 0.12s linear;
        transform-origin: center bottom;
        pointer-events: none;
        z-index: 3;
      }

      #gaston {
        height: var(--character-height);
        width: auto;
        left: var(--gaston-left);
        bottom: 0;
        transform: translateX(-50%);
      }

      #anillo-world {
        width: 56px;
        left: var(--anillo-left);
        top: var(--anillo-top);
        transform: translate(-50%, -50%);
      }

      #speech {
        position: absolute;
        z-index: 4;
        display: none;
        padding: 12px 16px;
        max-width: 190px;
        background: #fff;
        color: #111;
        border: 3px solid #111;
        border-radius: 20px;
        font-weight: 700;
      }

      #speech::after {
        content: "";
        position: absolute;
        left: 20px;
        bottom: -16px;
        width: 24px;
        height: 24px;
        background: #fff;
        border-right: 3px solid #111;
        border-bottom: 3px solid #111;
        transform: rotate(45deg);
      }

      #inventory {
        position: absolute;
        width: var(--inventory-width);
        aspect-ratio: 1062 / 493;
        right: 18px;
        bottom: 18px;
        z-index: 5;
      }

      #inventory-bg {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .inventory-slot {
        position: absolute;
        top: 18%;
        width: 12.5%;
        height: 64%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #slot-1 { left: 10.2%; }
      #slot-2 { left: 24.3%; }
      #slot-3 { left: 38.4%; }

      #anillo-item {
        width: 70%;
        max-height: 70%;
        object-fit: contain;
        object-position: center;
        transform: translate(12%, 130%);
        cursor: grab;
        display: none;
      }

      #anillo-item:active {
        cursor: grabbing;
      }

      .fallback {
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.8);
        border: 2px dashed #333;
        color: #111;
        font-size: 14px;
        font-weight: 700;
      }

      .buzz {
        animation: buzz 0.2s linear 0s 2;
      }

      @keyframes buzz {
        0% { transform: translateX(0); }
        25% { transform: translateX(-4px) rotate(-3deg); }
        75% { transform: translateX(4px) rotate(3deg); }
        100% { transform: translateX(0); }
      }
    </style>
  </head>
  <body>
    <div id="scene" aria-label="Escena">
      <img id="background" src="images/fondo1.png" alt="Fondo" />

      <img id="guardian" class="entity" src="images/guardian.png" alt="Guardian" />
      <img id="gaston" class="entity" src="images/gaston.png" alt="Gaston" />
      <img id="anillo-world" class="entity" src="images/anillo.png" alt="Anillo" />

      <div id="speech">PRUEBA</div>

      <div id="inventory" aria-label="Inventario">
        <img id="inventory-bg" src="images/inventario.png" alt="Inventario" />
        <div id="slot-1" class="inventory-slot"></div>
        <div id="slot-2" class="inventory-slot"></div>
        <div id="slot-3" class="inventory-slot"></div>
        <img id="anillo-item" class="inventory-item" src="images/anillo.png" alt="Anillo en inventario" draggable="true" />
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
