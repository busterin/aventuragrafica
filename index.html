<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aventura Grafica - Prueba</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="scene-viewport">
      <div id="scene" aria-label="Escena">
        <img id="background" src="images/fondo1.png" alt="Fondo" />

        <img id="guardian" class="entity" src="images/guardian.png" alt="Guardian" />
        <img id="gaston" class="entity" src="images/gaston.png" alt="Gaston" />
        <img id="tele" class="entity" src="images/tele.png" alt="Tele" />
        <img id="ardillaguardiana" class="entity" src="images/ardillaguardiana.png" alt="Ardilla Guardiana" />
        <img id="bici" class="entity" src="images/bici.png" alt="Bici" />
        <img id="vendedora" class="entity" src="images/vendedora.png" alt="Vendedora" />
        <img id="brebaje" class="entity" src="images/brebaje.png" alt="Brebaje" />
        <div id="fondo2-hotspot-left" aria-label="Zona clicable fondo 2 izquierda"></div>
        <div id="fondo3-hotspot-left" aria-label="Zona clicable fondo 3 izquierda"></div>
        <div id="fondo3-hotspot" aria-label="Zona clicable fondo 3"></div>
        <div id="fondo4-hotspot-left-bottom" aria-label="Zona clicable fondo 4 izquierda abajo"></div>
        <div id="fondo5-hotspot-left" aria-label="Zona clicable fondo 5 izquierda"></div>
        <div id="fondo5-hotspot-center" aria-label="Zona clicable fondo 5 centro"></div>
        <img id="anillo-world" class="entity" src="images/anillo.png" alt="Anillo" />

        <div id="speech">
          <p id="speech-text">¡Hola, guardiana!</p>
          <div id="speech-options"></div>
          <button id="speech-next-btn" type="button">Continuar</button>
        </div>

        <div id="inventory" aria-label="Inventario">
          <img id="inventory-bg" src="images/inventario.png" alt="Inventario" />
          <div id="slot-1" class="inventory-slot"></div>
          <div id="slot-2" class="inventory-slot"></div>
          <div id="slot-3" class="inventory-slot"></div>
          <img id="anillo-item" class="inventory-item" src="images/anillo.png" alt="Anillo en inventario" draggable="true" />
          <img id="factura-item" class="inventory-item" src="images/factura.png" alt="Factura en inventario" draggable="true" />
          <img id="llave-item" class="inventory-item" src="images/llave.png" alt="Llave en inventario" draggable="true" />
          <img id="brebaje-item" class="inventory-item" src="images/brebaje.png" alt="Brebaje en inventario" draggable="true" />
        </div>

        <button id="next-arrow" type="button" aria-label="Ir a fondo 2"></button>
        <button id="prev-arrow" type="button" aria-label="Volver a fondo 1"></button>
      </div>
    </div>

    <div id="item-modal" aria-hidden="true">
      <div id="item-modal-content" role="dialog" aria-modal="true" aria-label="Detalle del objeto">
        <img id="item-modal-image" src="images/anillo.png" alt="Anillo ampliado" />
        <p id="item-modal-text">Un anillo de origen desconocido.<br>Parece ser de gran valor.</p>
        <button id="item-modal-close" type="button">Cerrar</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
