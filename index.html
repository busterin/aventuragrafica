<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aventura Grafica - Prueba</title>
    <style>
      :root {
        --inventory-width: 28.61%;
        --character-height: 37.5%;
        --guardian-left: 32.38%;
        --gaston-left: 64.76%;
        --anillo-left: 50%;
        --anillo-top: 73.75%;
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        background: #000;
      }

      #scene-viewport {
        position: relative;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: #000;
      }

      #scene {
        position: absolute;
        left: 0;
        top: 0;
        width: 1328px;
        height: 800px;
        transform-origin: top left;
      }

      #background {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        display: block;
      }

      .entity {
        position: absolute;
        z-index: 2;
        cursor: pointer;
      }

      #guardian {
        height: var(--character-height);
        width: auto;
        left: var(--guardian-left);
        bottom: 0;
        transition: left 1.4s linear, transform 0.12s linear;
        transform-origin: center bottom;
        pointer-events: none;
        z-index: 3;
      }

      #gaston {
        height: var(--character-height);
        width: auto;
        left: var(--gaston-left);
        bottom: 0;
        transform: translateX(-50%);
      }

      #anillo-world {
        width: 2.56%;
        left: var(--anillo-left);
        top: var(--anillo-top);
        transform: translate(-50%, -50%);
      }

      #speech {
        position: absolute;
        z-index: 4;
        display: none;
        padding: 12px 16px;
        max-width: 190px;
        background: #fff;
        color: #111;
        border: 3px solid #111;
        border-radius: 20px;
        font-weight: 700;
      }

      #speech::after {
        content: "";
        position: absolute;
        left: 20px;
        bottom: -16px;
        width: 24px;
        height: 24px;
        background: #fff;
        border-right: 3px solid #111;
        border-bottom: 3px solid #111;
        transform: rotate(45deg);
      }

      #inventory {
        position: absolute;
        width: var(--inventory-width);
        aspect-ratio: 1062 / 493;
        right: 1.36%;
        bottom: 2.25%;
        z-index: 5;
      }

      #inventory-bg {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .inventory-slot {
        position: absolute;
        top: 9%;
        width: 12.5%;
        height: 64%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #slot-1 { left: 10.2%; }
      #slot-2 { left: 24.3%; }
      #slot-3 { left: 38.4%; }

      #anillo-item {
        width: 70%;
        max-height: 70%;
        object-fit: contain;
        object-position: center;
        transform: translate(12%, 92%);
        cursor: grab;
        display: none;
      }

      #anillo-item:active {
        cursor: grabbing;
      }

      .fallback {
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.8);
        border: 2px dashed #333;
        color: #111;
        font-size: 14px;
        font-weight: 700;
      }

      .buzz {
        animation: buzz 0.2s linear 0s 2;
      }

      #item-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        z-index: 20;
      }

      #item-modal.open {
        display: flex;
      }

      #item-modal-content {
        width: min(90vw, 440px);
        padding: 20px 18px 18px;
        border: 3px solid #111;
        border-radius: 18px;
        background: #f6f2e8;
        color: #111;
        text-align: center;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      #item-modal-image {
        width: min(52vw, 180px);
        height: auto;
        object-fit: contain;
        margin-bottom: 14px;
      }

      #item-modal-text {
        margin: 0;
        line-height: 1.35;
        font-size: 18px;
        font-weight: 700;
      }

      #item-modal-close {
        margin-top: 14px;
        border: 2px solid #111;
        border-radius: 10px;
        background: #fff;
        color: #111;
        padding: 6px 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      @keyframes buzz {
        0% { transform: translateX(0); }
        25% { transform: translateX(-4px) rotate(-3deg); }
        75% { transform: translateX(4px) rotate(3deg); }
        100% { transform: translateX(0); }
      }
    </style>
  </head>
  <body>
    <div id="scene-viewport">
      <div id="scene" aria-label="Escena">
        <img id="background" src="images/fondo1.png" alt="Fondo" />

        <img id="guardian" class="entity" src="images/guardian.png" alt="Guardian" />
        <img id="gaston" class="entity" src="images/gaston.png" alt="Gaston" />
        <img id="anillo-world" class="entity" src="images/anillo.png" alt="Anillo" />

        <div id="speech">¡Hola, guardiana!</div>

        <div id="inventory" aria-label="Inventario">
          <img id="inventory-bg" src="images/inventario.png" alt="Inventario" />
          <div id="slot-1" class="inventory-slot"></div>
          <div id="slot-2" class="inventory-slot"></div>
          <div id="slot-3" class="inventory-slot"></div>
          <img id="anillo-item" class="inventory-item" src="images/anillo.png" alt="Anillo en inventario" draggable="true" />
        </div>
      </div>
    </div>

    <div id="item-modal" aria-hidden="true">
      <div id="item-modal-content" role="dialog" aria-modal="true" aria-label="Detalle del objeto">
        <img id="item-modal-image" src="images/anillo.png" alt="Anillo ampliado" />
        <p id="item-modal-text">Un anillo de origen desconocido.<br>Parece ser de gran valor.</p>
        <button id="item-modal-close" type="button">Cerrar</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
